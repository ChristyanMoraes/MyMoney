# Digital Ocean App Platform — exemplo para Next.js (Web Service).
# NÃO use "static_sites" para este projeto: a app precisa de Node em runtime (next start).
#
# Ajuste: instance_size_slug, region, e defina secrets (DATABASE_URL, AUTH_SECRET) na UI ou com referências seguras.
# NEXTAUTH_URL deve ser o URL público HTTPS da app (ex.: https://mymoney-xxxxx.ondigitalocean.app).

alerts:
  - rule: DEPLOYMENT_FAILED
  - rule: DOMAIN_FAILED
features:
  - buildpack-stack=ubuntu-22
name: mymoney
region: atl
services:
  - name: mymoney
    github:
      branch: main
      deploy_on_push: true
      repo: ChristyanMoraes/MyMoney
    source_dir: /
    environment_slug: node-js
    build_command: npm ci && npm run build
    run_command: npm start
    instance_count: 1
    instance_size_slug: basic-xxs
    http_port: 8080
    envs:
      - key: NODE_ENV
        value: production
        scope: RUN_AND_BUILD_TIME
      # A plataforma define PORT = http_port (não defina PORT manualmente salvo indicação em contrário).
      # Ligue à BD real (build + runtime: prisma generate na build)
      - key: DATABASE_URL
        scope: RUN_AND_BUILD_TIME
        type: SECRET
        value: YOUR_DATABASE_URL
      - key: AUTH_SECRET
        scope: RUN_AND_BUILD_TIME
        type: SECRET
        value: YOUR_AUTH_SECRET
      - key: NEXTAUTH_URL
        scope: RUN_AND_BUILD_TIME
        value: https://SUBSTITUA-pelo-url-publico-da-app.ondigitalocean.app
ingress:
  rules:
    - component:
        name: mymoney
      match:
        path:
          prefix: /
